<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pointeuse BCSO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
}

/* 👤 Profil en haut à gauche */
#profil {
  position: absolute;
  top: 20px;
  left: 20px;
  text-align: left;
  background: rgba(255,255,255,0.05);
  padding: 10px;
  border-radius: 10px;
}

input {
  padding: 8px;
  margin: 3px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.save {
  background: #38bdf8;
  color: white;
}

.toggle {
  width: 80px;
  height: 40px;
  background: red;
  border-radius: 20px;
  margin: 20px auto;
  position: relative;
  cursor: pointer;
}

.circle {
  width: 30px;
  height: 30px;
  background: white;
  border-radius: 50%;
  position: absolute;
  top: 5px;
  left: 5px;
  transition: 0.3s;
}

.active {
  background: green;
}

.active .circle {
  left: 45px;
}

#log {
  margin-top: 30px;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 10px;
  text-align: left;
}
</style>

</head>
<body>

<!-- 👤 PROFIL -->
<div id="profil">
  <input id="nom" placeholder="Nom"><br>
  <input id="prenom" placeholder="Prénom"><br>
  <input id="matricule" placeholder="Matricule"><br>
  <button class="save" onclick="saveUser()">Enregistrer</button>

  <div id="afficheUser"></div>
</div>

<h1>🕒 Pointeuse BCSO</h1>

<div id="status">Hors service</div>

<div id="toggle" class="toggle" onclick="pointer()">
  <div class="circle"></div>
</div>

<div id="heures">Heures totales : 0 min</div>

<div id="log"></div>

<script>
let actif = false;
let debut = null;
let total = 0;

let logs = JSON.parse(localStorage.getItem("logs")) || [];

function saveUser() {
  let user = {
    nom: document.getElementById("nom").value,
    prenom: document.getElementById("prenom").value,
    matricule: document.getElementById("matricule").value
  };

  localStorage.setItem("user", JSON.stringify(user));
  afficherUser();
}

function afficherUser() {
  let user = JSON.parse(localStorage.getItem("user"));
  if (!user) return;

  document.getElementById("afficheUser").innerHTML =
    `<b>${user.prenom} ${user.nom}</b><br>Matricule: ${user.matricule}`;
}

function pointer() {
  let now = new Date();

  if (!actif) {
    debut = now;
    document.getElementById("status").innerText = "En service";
    document.getElementById("toggle").classList.add("active");
    actif = true;
  } else {
    let fin = now;
    let diff = Math.floor((fin - debut) / 60000);
    total += diff;

    logs.push({
      debut: debut.toLocaleString(),
      fin: fin.toLocaleString(),
      duree: diff
    });

    localStorage.setItem("logs", JSON.stringify(logs));

    document.getElementById("status").innerText = "Hors service";
    document.getElementById("toggle").classList.remove("active");
    actif = false;

    afficher();
  }

  document.getElementById("heures").innerText =
    "Heures totales : " + total + " min";
}

function afficher() {
  let html = "<h3>Historique</h3>";

  logs.slice().reverse().forEach(l => {
    html += `
      <p>
      🟢 Début : ${l.debut}<br>
      🔴 Fin : ${l.fin}<br>
      ⏱️ ${l.duree} min
      </p><hr>`;
  });

  document.getElementById("log").innerHTML = html;
}

afficherUser();
afficher();
</script>

</body>
</html>
